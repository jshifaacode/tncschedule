<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifikasi — TNCschedule</title>
  <link rel="icon" href="assets/logo/tnc-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script>
    try {
      var t = JSON.parse(localStorage.getItem('tncschedule:theme') || '"light"');
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
    document.documentElement.classList.add('theme-ready');
  </script>
</head>
<body>
  <a href="#main-content" class="skip-link">Lewati ke konten utama</a>

  <div class="app-shell" id="app-shell">
    <div id="sidebar-root"></div>

    <div class="app-main">
      <header class="app-header">
        <h2 style="font-size:var(--fs-md);">Notifikasi</h2>
        <div class="flex items-center gap-3">
          <span data-user-avatar></span>
          <button type="button" class="btn btn-sm" data-logout-btn>Keluar</button>
        </div>
      </header>

      <main class="app-content page-enter" id="main-content" style="max-width:640px;">
        <div class="card">
          <div data-notif-list></div>
        </div>
      </main>
    </div>
  </div>

  <div id="bottomnav-root"></div>

  <script type="module" src="js/modules/notifications-page.js"></script>
</body>
</html>
