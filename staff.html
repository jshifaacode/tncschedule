<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Staff — TNCschedule</title>
  <link rel="icon" href="assets/logo/tnc-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script>
    try {
      var t = JSON.parse(localStorage.getItem('tncschedule:theme') || '"light"');
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
    document.documentElement.classList.add('theme-ready');
  </script>
</head>
<body>
  <a href="#main-content" class="skip-link">Lewati ke konten utama</a>

  <div class="app-shell" id="app-shell">
    <div id="sidebar-root"></div>

    <div class="app-main">
      <header class="app-header">
        <h2 style="font-size:var(--fs-md);">Data Staff</h2>
        <div class="flex items-center gap-3">
          <button type="button" class="btn btn-icon btn-ghost" data-theme-toggle aria-label="Ganti tema">🌓</button>
          <a href="notifications.html" class="btn btn-icon btn-ghost" aria-label="Notifikasi">🔔</a>
          <span data-user-avatar></span>
          <button type="button" class="btn btn-sm" data-logout-btn>Keluar</button>
        </div>
      </header>

      <main class="app-content page-enter" id="main-content">
        <div class="cal-toolbar">
          <input class="input" type="search" placeholder="Cari nama, jobdesk, atau email..." data-staff-search style="max-width:320px;">
          <div class="cal-view-switch">
            <button type="button" data-staff-view-btn="table" aria-pressed="true">Tabel</button>
            <button type="button" data-staff-view-btn="card" aria-pressed="false">Kartu</button>
          </div>
        </div>

        <div data-staff-content></div>
      </main>
    </div>
  </div>

  <div id="bottomnav-root"></div>

  <script type="module" src="js/modules/staff-page.js"></script>
</body>
</html>
