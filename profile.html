<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Saya — TNCschedule</title>
    <link rel="icon" href="assets/logo/tnc-logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/animation.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script>
      try {
        var t = JSON.parse(
          localStorage.getItem("tncschedule:theme") || '"light"',
        );
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
      document.documentElement.classList.add("theme-ready");
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Lewati ke konten utama</a>

    <div class="app-shell" id="app-shell">
      <div id="sidebar-root"></div>

      <div class="app-main">
        <header class="app-header">
          <h2 style="font-size: var(--fs-md)">Profil Saya</h2>
          <div class="flex items-center gap-3">
            <button
              type="button"
              class="btn btn-icon btn-ghost"
              data-theme-toggle
              aria-label="Ganti tema"
            >
              🌓
            </button>
            <a
              href="notifications.html"
              class="btn btn-icon btn-ghost"
              aria-label="Notifikasi"
              >🔔</a
            >
            <span data-user-avatar></span>
            <button type="button" class="btn btn-sm" data-logout-btn>
              Keluar
            </button>
          </div>
        </header>

        <main class="app-content page-enter" id="main-content">
          <div class="profile-header">
            <div class="profile-avatar-wrap">
              <div data-profile-avatar></div>
              <button
                type="button"
                class="profile-avatar-edit"
                id="avatar-edit-trigger"
                aria-label="Ganti foto profil"
              >
                ✎
              </button>
              <input
                type="file"
                id="avatar-upload-input"
                accept="image/jpeg,image/png,image/webp"
                class="hidden"
              />
            </div>
            <div class="profile-header-info">
              <h2 data-profile-name>Memuat...</h2>
              <p data-profile-jobdesk></p>
            </div>
          </div>

          <div class="profile-stat-row" data-profile-stats></div>

          <div
            class="card"
            style="max-width: 600px"
            data-profile-activity-realtime
          >
            <div class="card-header" style="margin-bottom: 12px">
              <h3 class="card-title">Komentar & Evaluasi (Realtime)</h3>
            </div>

            <div
              class="tabs"
              role="tablist"
              aria-label="Tab komentar dan evaluasi"
              style="margin-bottom: 12px"
            >
              <button
                type="button"
                class="tab"
                data-profile-feed-tab="comments"
                aria-selected="true"
              >
                Komentar
              </button>
              <button
                type="button"
                class="tab"
                data-profile-feed-tab="evaluations"
                aria-selected="false"
              >
                Evaluasi
              </button>
            </div>

            <div class="profile-feed" data-profile-feed-body>
              <div data-profile-feed-loading>
                <div class="empty-state" style="padding: 16px 0">
                  <div class="empty-state-icon">⏳</div>
                  <div class="empty-state-title">Memuat…</div>
                </div>
              </div>
              <div class="hidden" data-profile-feed-list></div>
            </div>
          </div>

          <div class="card" style="max-width: 600px">
            <h3 class="card-title" style="margin-bottom: 16px">
              Edit Data Diri
            </h3>
            <form id="profile-form" class="flex flex-col gap-4">
              <div class="field">
                <label class="field-label" for="fullName"
                  >Nama Lengkap <span class="required">*</span></label
                >
                <input class="input" id="fullName" required />
              </div>
              <div class="field">
                <label class="field-label" for="jobdesk">Jobdesk</label>
                <input class="input" id="jobdesk" />
              </div>
              <div class="field">
                <label class="field-label" for="division">Divisi</label>
                <input class="input" id="division" />
              </div>
              <div class="field">
                <label class="field-label" for="phone">Nomor HP</label>
                <input class="input" id="phone" type="tel" />
              </div>
              <button type="submit" class="btn btn-primary">
                Simpan Perubahan
              </button>
            </form>
          </div>
        </main>
      </div>
    </div>

    <div id="bottomnav-root"></div>

    <script type="module" src="js/modules/profile-page.js"></script>
    <script>
      document
        .getElementById("avatar-edit-trigger")
        .addEventListener("click", () => {
          document.getElementById("avatar-upload-input").click();
        });
    </script>
  </body>
</html>
