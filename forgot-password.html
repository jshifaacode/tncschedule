<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Kata Sandi — TNCschedule</title>
  <link rel="icon" href="assets/logo/tnc-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script>
    try {
      var t = JSON.parse(localStorage.getItem('tncschedule:theme') || '"light"');
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
    document.documentElement.classList.add('theme-ready');
  </script>
</head>
<body>
  <main class="auth-page">
    <section class="auth-visual" aria-hidden="true">
      <div class="auth-visual-grid"></div>
      <div class="auth-visual-brand">
        <img src="assets/logo/tnc-logo.png" alt="" onerror="this.style.display='none'">
        <span>TNCschedule</span>
      </div>
      <div class="auth-visual-quote">
        <h2>Lupa kata sandi? Tidak masalah.</h2>
        <p>Kami akan mengirimkan tautan reset kata sandi ke email terdaftar Anda.</p>
      </div>
      <div></div>
    </section>

    <section class="auth-form-side">
      <div class="auth-form-box slide-up">
        <h1>Reset Kata Sandi</h1>
        <p class="auth-subtitle">Masukkan email akun Anda.</p>

        <div id="auth-error" class="auth-error-banner hidden" role="alert"></div>
        <div id="auth-success" class="hidden" style="background:var(--color-accent-green-bg);color:var(--color-accent-green);border:1px solid var(--color-accent-green);border-radius:var(--radius-md);padding:12px;font-size:var(--fs-sm);font-weight:500;" role="status"></div>

        <form class="auth-form" id="forgot-form" novalidate>
          <div class="field">
            <label class="field-label" for="email">Email <span class="required">*</span></label>
            <input class="input" type="email" id="email" autocomplete="username" required>
            <span class="field-error hidden" id="email-error"></span>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Kirim Tautan Reset</button>
        </form>

        <p class="auth-footer-link"><a href="login.html">← Kembali ke halaman masuk</a></p>
      </div>
    </section>
  </main>

  <script type="module">
    import { requestPasswordReset, mapAuthError } from "./js/firebase/auth.js";
    import { required, isValidEmail, runValidators, showFieldError, clearFieldError } from "./js/utils/validator.js";
    import { qs } from "./js/utils/helper.js";

    const form = qs("#forgot-form");
    const errorBanner = qs("#auth-error");
    const successBanner = qs("#auth-success");
    const submitBtn = qs("#submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBanner.classList.add("hidden");
      successBanner.classList.add("hidden");

      const emailEl = qs("#email");
      const emailError = qs("#email-error");
      clearFieldError(emailEl, emailError);

      const check = runValidators([() => required(emailEl.value, "Email"), () => isValidEmail(emailEl.value)]);
      if (!check.valid) return showFieldError(emailEl, emailError, check.message);

      submitBtn.disabled = true;
      submitBtn.textContent = "Mengirim...";
      try {
        await requestPasswordReset(emailEl.value.trim());
        successBanner.textContent = "✅ Tautan reset kata sandi telah dikirim. Silakan periksa email Anda.";
        successBanner.classList.remove("hidden");
        form.reset();
      } catch (err) {
        errorBanner.textContent = mapAuthError(err.code);
        errorBanner.classList.remove("hidden");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Kirim Tautan Reset";
      }
    });
  </script>
</body>
</html>
