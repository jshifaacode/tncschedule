<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengaturan — TNCschedule</title>
    <link rel="icon" href="assets/logo/tnc-logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/animation.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script>
      try {
        var t = JSON.parse(
          localStorage.getItem("tncschedule:theme") || '"light"',
        );
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
      document.documentElement.classList.add("theme-ready");
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Lewati ke konten utama</a>

    <div class="app-shell" id="app-shell">
      <div id="sidebar-root"></div>

      <div class="app-main">
        <header class="app-header">
          <h2 style="font-size: var(--fs-md)">Pengaturan</h2>
          <div class="flex items-center gap-3">
            <a
              href="notifications.html"
              class="btn btn-icon btn-ghost"
              aria-label="Notifikasi"
              >🔔</a
            >
            <span data-user-avatar></span>
            <button type="button" class="btn btn-sm" data-logout-btn>
              Keluar
            </button>
          </div>
        </header>

        <main
          class="app-content page-enter"
          id="main-content"
          style="max-width: 640px"
        >
          <div class="card settings-section">
            <h3>Tampilan</h3>
            <div class="settings-row">
              <div>
                <div class="settings-row-label">Tema</div>
                <div class="settings-row-desc">
                  Pilih tampilan terang atau gelap.
                </div>
              </div>
              <div class="theme-switch">
                <button
                  type="button"
                  data-theme-option="light"
                  aria-pressed="true"
                >
                  Terang
                </button>
                <button
                  type="button"
                  data-theme-option="dark"
                  aria-pressed="false"
                >
                  Gelap
                </button>
              </div>
            </div>
          </div>

          <div class="card settings-section">
            <h3>Notifikasi</h3>
            <div class="settings-row">
              <div>
                <div class="settings-row-label">Notifikasi Browser</div>
                <div class="settings-row-desc">
                  Terima notifikasi pengingat kegiatan langsung dari browser.
                </div>
              </div>
              <label class="checkbox-row">
                <input type="checkbox" id="browser-notif-toggle" />
                Aktifkan
              </label>
            </div>
          </div>

          <div class="card settings-section">
            <h3>Ubah Kata Sandi</h3>
            <form id="password-form" class="flex flex-col gap-4">
              <div class="field">
                <label class="field-label">Kata Sandi Saat Ini</label>
                <input
                  class="input"
                  type="password"
                  id="currentPassword"
                  required
                />
              </div>
              <div class="field">
                <label class="field-label">Kata Sandi Baru</label>
                <input
                  class="input"
                  type="password"
                  id="newPassword"
                  required
                />
              </div>
              <div class="field">
                <label class="field-label">Konfirmasi Kata Sandi Baru</label>
                <input
                  class="input"
                  type="password"
                  id="confirmNewPassword"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary">
                Perbarui Kata Sandi
              </button>
            </form>
          </div>

          <div class="card settings-section">
            <h3>Ubah Email</h3>
            <form id="email-form" class="flex flex-col gap-4">
              <div class="field">
                <label class="field-label">Kata Sandi</label>
                <input
                  class="input"
                  type="password"
                  id="emailCurrentPassword"
                  required
                />
              </div>
              <div class="field">
                <label class="field-label">Email Baru</label>
                <input class="input" type="email" id="newEmail" required />
              </div>
              <button type="submit" class="btn btn-primary">
                Perbarui Email
              </button>
            </form>
          </div>
        </main>
      </div>
    </div>

    <div id="bottomnav-root"></div>

    <script type="module" src="js/modules/settings-page.js"></script>
  </body>
</html>
