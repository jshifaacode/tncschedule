<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — TNCschedule</title>
    <link rel="icon" href="assets/logo/tnc-logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/animation.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
    <script>
      try {
        var t = JSON.parse(
          localStorage.getItem("tncschedule:theme") || '"light"',
        );
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
      document.documentElement.classList.add("theme-ready");
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Lewati ke konten utama</a>

    <div class="app-shell" id="app-shell">
      <div id="sidebar-root"></div>

      <div class="app-main">
        <header class="app-header">
          <div></div>
          <div class="flex items-center gap-3">
            <button
              type="button"
              class="btn btn-icon btn-ghost"
              data-theme-toggle
              aria-label="Ganti tema"
            >
              🌓
            </button>
            <a
              href="notifications.html"
              class="btn btn-icon btn-ghost"
              aria-label="Notifikasi"
              >🔔</a
            >
            <div class="flex items-center gap-2">
              <span data-user-avatar></span>
              <div class="hidden" style="display: block">
                <div class="text-sm" style="font-weight: 600" data-user-name>
                  Memuat...
                </div>
                <div class="text-xs text-faint" data-user-jobdesk></div>
              </div>
            </div>
            <button type="button" class="btn btn-sm" data-logout-btn>
              Keluar
            </button>
          </div>
        </header>

        <main class="app-content page-enter" id="main-content">
          <div class="dash-welcome">
            <div class="dash-welcome-text">
              <h1>Selamat Datang, <span data-welcome-name>Staff</span> 👋</h1>
              <p class="text-muted" data-clock-date>Memuat tanggal...</p>
            </div>
            <div class="dash-welcome-clock">
              <span class="text-xs">Waktu Saat Ini</span>
              <strong data-clock>00:00:00</strong>
            </div>
          </div>

          <div class="quick-actions">
            <a href="calendar.html?action=new" class="btn btn-primary"
              >+ Tambah Kegiatan</a
            >
            <a href="attendance.html" class="btn">✅ Absen Masuk</a>
            <a href="calendar.html" class="btn">📅 Lihat Kalender</a>
            <a href="attendance.html#rekap" class="btn">📊 Lihat Rekap</a>
          </div>

          <div class="stat-grid" data-stat-grid></div>

          <div class="dash-grid">
            <div class="flex flex-col gap-5">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Kegiatan Hari Ini</h3>
                  <a href="calendar.html" class="text-sm text-muted"
                    >Lihat semua →</a
                  >
                </div>
                <div data-today-activities></div>
              </div>

              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Kegiatan Mendatang</h3>
                </div>
                <div data-upcoming-list></div>
              </div>
            </div>

            <div class="flex flex-col gap-5">
              <div class="card">
                <h3 class="card-title" style="margin-bottom: 12px">
                  Kalender Mini
                </h3>
                <div data-mini-calendar></div>
              </div>

              <div class="card">
                <h3 class="card-title" style="margin-bottom: 12px">
                  Status Staff Hari Ini
                </h3>
                <canvas
                  id="attendance-today-chart"
                  height="160"
                  style="margin-bottom: 12px"
                ></canvas>
                <div class="status-today-grid" data-status-today></div>
              </div>

              <div class="card">
                <h3 class="card-title" style="margin-bottom: 8px">
                  Aktivitas Terbaru
                </h3>
                <div data-feed-list></div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <div id="bottomnav-root"></div>

    <script type="module" src="js/modules/dashboard-page.js"></script>
  </body>
</html>
