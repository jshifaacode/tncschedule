<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Staff — TNCschedule</title>
    <link rel="icon" href="assets/logo/tnc-logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/animation.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script>
      try {
        var t = JSON.parse(
          localStorage.getItem("tncschedule:theme") || '"light"',
        );
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
      document.documentElement.classList.add("theme-ready");
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Lewati ke konten utama</a>

    <div class="app-shell" id="app-shell">
      <div id="sidebar-root"></div>

      <div class="app-main">
        <header class="app-header">
          <a href="staff.html" class="text-sm text-muted"
            >← Kembali ke Data Staff</a
          >
          <div class="flex items-center gap-3">
            <a
              href="notifications.html"
              class="btn btn-icon btn-ghost"
              aria-label="Notifikasi"
              >🔔</a
            >
            <span data-user-avatar></span>
            <button type="button" class="btn btn-sm" data-logout-btn>
              Keluar
            </button>
          </div>
        </header>

        <main
          class="app-content page-enter"
          id="main-content"
          data-staff-detail-content
        >
          <div class="profile-header">
            <div data-staff-avatar></div>
            <div class="profile-header-info">
              <h2 data-staff-name>Memuat...</h2>
              <p data-staff-jobdesk></p>
            </div>
          </div>

          <div class="profile-stat-row" data-staff-stats></div>

          <div class="card" style="max-width: 480px">
            <h3 class="card-title" style="margin-bottom: 16px">
              Informasi Kontak
            </h3>
            <div class="settings-row">
              <span class="settings-row-label">Email</span
              ><span data-staff-email></span>
            </div>
            <div class="settings-row">
              <span class="settings-row-label">Nomor HP</span
              ><span data-staff-phone></span>
            </div>
            <div class="settings-row">
              <span class="settings-row-label">Tanggal Bergabung</span
              ><span data-staff-joined></span>
            </div>
          </div>
        </main>
      </div>
    </div>

    <div id="bottomnav-root"></div>

    <script type="module" src="js/modules/staff-detail-page.js"></script>
  </body>
</html>
